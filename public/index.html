<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Time Capsule · كبسولة الزمن</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 30% 10%, #0b0c1a 0%, #030514 100%);
      font-family: 'Tajawal', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem;
      color: #e8eef2;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                        radial-gradient(2px 2px at 15% 85%, #b0c4ff, transparent),
                        radial-gradient(2px 2px at 85% 15%, #ffd7b0, transparent);
      background-size: 250px 250px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .main-container {
      width: 100%; max-width: 950px;
      background: rgba(8,12,30,0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3.5rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 30px rgba(90,150,255,0.2);
      border: 1px solid rgba(100,150,255,0.25);
      padding: 2.2rem 2rem;
      display: flex; flex-direction: column; gap: 2.8rem;
      z-index: 2; position: relative;
    }

    .glass-panel {
      background: rgba(20,25,50,0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      border: 1px solid rgba(200,210,255,0.2);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(170,200,255,0.15);
      padding: 2rem 1.8rem;
    }

    .hero { text-align: center; }

    .hero h1 {
      font-size: clamp(2.7rem, 8vw, 4.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b9ff 40%, #c4b5fd 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px #4f5eff);
    }

    .hero .subtitle { font-size: 1.2rem; color: #b9c8ff; }

    textarea {
      width: 100%;
      background: rgba(10,15,35,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(120,150,255,0.4);
      border-radius: 2rem;
      padding: 1.4rem;
      color: #f0f4ff;
      font-size: 1.05rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 130px;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #8ea4ff;
      box-shadow: 0 0 22px #3f5cff;
    }

    .row-inputs {
      display: flex; flex-wrap: wrap; gap: 1.3rem; align-items: flex-end; margin-top: 1rem;
    }

    .input-field { flex: 1 1 220px; display: flex; flex-direction: column; gap: 0.4rem; }

    .input-field label {
      font-size: 0.8rem; text-transform: uppercase; color: #b0c6ff; margin-right: 0.7rem;
    }

    input[type="email"], input[type="datetime-local"] {
      background: rgba(10,14,32,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(110,140,255,0.5);
      border-radius: 2.5rem;
      padding: 0.9rem 1.3rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }

    .seal-btn {
      background: rgba(25,30,60,0.7);
      border: 1px solid #6e8bff;
      border-radius: 3rem;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      color: #eaefff;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.7), 0 0 20px #2f45a0;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 0.8rem; width: fit-content; align-self: center;
      font-family: inherit;
    }

    .seal-btn:hover {
      box-shadow: 0 0 35px #5070ff; transform: scale(1.02);
    }

    .capsules-list {
      display: flex; flex-direction: column; gap: 1rem;
      max-height: 260px; overflow-y: auto;
    }

    .capsule-item {
      background: rgba(15,20,45,0.5);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid rgba(90,120,255,0.35);
    }

    .countdown {
      font-weight: 600; font-size: 1.1rem;
      background: linear-gradient(to right, #dccdff, #a0b9ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .how-it-works {
      display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: space-around;
    }

    .step { flex: 1 1 140px; text-align: center; color: #bdd3ff; }
    .step i { font-size: 2rem; }

    @media (max-width: 550px) {
      .main-container { padding: 1.5rem 1.2rem; }
      .row-inputs { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="main-container">
  <div class="hero glass-panel">
    <h1>كبسولة الزمن</h1>
    <p class="subtitle"><i class="far fa-clock"></i> أرسل رسالة إلى نفسك في المستقبل</p>
  </div>

  <div class="glass-panel">
    <textarea id="messageInput" placeholder="عزيزي أنا في المستقبل..."></textarea>
    <div class="row-inputs">
      <div class="input-field">
        <label><i class="far fa-calendar-alt"></i> تاريخ الفتح</label>
        <input type="datetime-local" id="unlockDateInput" />
      </div>
      <div class="input-field">
        <label><i class="far fa-envelope"></i> بريدك الإلكتروني</label>
        <input type="email" id="emailInput" placeholder="example@domain.com" />
      </div>
    </div>
    <button class="seal-btn" id="sealButton">
      <i class="fas fa-lock"></i> ختم الكبسولة <i class="fas fa-rocket"></i>
    </button>
  </div>

  <div class="glass-panel">
    <h2 style="margin-bottom:1rem;"><i class="fas fa-archive"></i> الكبسولات المخزنة</h2>
    <div id="capsulesContainer" class="capsules-list">
      <div style="text-align:center;color:#7f8bb3;">⏳ جاري التحميل...</div>
    </div>
  </div>

  <div class="how-it-works glass-panel">
    <div class="step"><i class="fas fa-pen-fancy"></i><p>اكتب رسالة</p></div>
    <div class="step"><i class="fas fa-calendar-check"></i><p>اختر التاريخ</p></div>
    <div class="step"><i class="fas fa-lock"></i><p>ختم وتخزين</p></div>
    <div class="step"><i class="fas fa-envelope-open-text"></i><p>إرسال تلقائي</p></div>
  </div>
</div>

<script>
  // السيرفر على نفس المسار
  const API_URL = "/api/capsules";

  const messageInput = document.getElementById('messageInput');
  const unlockDateInput = document.getElementById('unlockDateInput');
  const emailInput = document.getElementById('emailInput');
  const sealButton = document.getElementById('sealButton');
  const capsulesContainer = document.getElementById('capsulesContainer');

  function setDefaultDate() {
    const now = new Date();
    now.setDate(now.getDate() + 1);
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const h = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    unlockDateInput.value = `${y}-${m}-${d}T${h}:${min}`;
  }
  setDefaultDate();

  sealButton.addEventListener('click', async () => {
    const message = messageInput.value.trim();
    const unlockDate = unlockDateInput.value;
    const email = emailInput.value.trim();

    if (!message || !unlockDate || !email) return alert("املأ جميع الحقول");
    if (new Date(unlockDate) <= new Date()) return alert("اختر تاريخاً في المستقبل");

    try {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email,
          message: message,
          unlockDate: new Date(unlockDate).toISOString()
        })
      });

      messageInput.value = '';
      emailInput.value = '';
      setDefaultDate();
      loadCapsules();
      alert("✅ تم ختم الكبسولة! السيرفر سيرسلها تلقائياً في الموعد.");
    } catch (err) {
      alert("❌ خطأ في الاتصال بالسيرفر");
    }
  });

  async function loadCapsules() {
    try {
      const res = await fetch(API_URL);
      const capsules = await res.json();

      if (!capsules.length) {
        capsulesContainer.innerHTML = '<div style="text-align:center;color:#7f8bb3;">✨ لا توجد كبسولات</div>';
        return;
      }

      capsulesContainer.innerHTML = capsules.map(c => {
        const now = new Date().getTime();
        const unlock = new Date(c.unlockDate).getTime();
        const dist = unlock - now;

        let countdownText = '';
        if (c.status === 'sent') {
          countdownText = '✅ تم الإرسال';
        } else if (dist <= 0) {
          countdownText = '🔓 جاري الإرسال...';
        } else {
          const d = Math.floor(dist / (1000*60*60*24));
          const h = Math.floor((dist % (1000*60*60*24)) / (1000*60*60));
          const m = Math.floor((dist % (1000*60*60)) / (1000*60));
          countdownText = `${d}ي ${h}س ${m}د`;
        }

        return `
          <div class="capsule-item">
            <div>
              <small>📧 ${c.email}</small><br>
              <small style="color:#9aa9e0;">🔐 ${new Date(c.unlockDate).toLocaleString('ar-SA')}</small>
            </div>
            <div class="countdown">${countdownText}</div>
          </div>
        `;
      }).join('');

    } catch (err) {
      capsulesContainer.innerHTML = '<div style="text-align:center;color:#ff9999;">❌ خطأ في التحميل</div>';
    }
  }

  loadCapsules();
  setInterval(loadCapsules, 10000);
</script>
</body>
</html>
